# Accessibility Coverage Specifications v1.0.0
# Based on WCAG 2.2 Level AA
# Released: 2026-04-01
# Status: Stable

spec:
  version: "1.0.0"
  wcag_version: "2.2"
  wcag_level: "AA"
  release_date: "2026-04-01"
  standards:
    - "WCAG 2.2 Level AA"
    - "Material Design 3"
    - "Flutter Best Practices"

# Categories
categories:
  semantics:
    id: "semantics"
    name: "Semantic Information"
    description: "Widgets must provide semantic information for screen readers"
    wcag_principles: ["Perceivable", "Understandable"]
  
  contrast:
    id: "contrast"
    name: "Color Contrast"
    description: "Text and UI elements must have sufficient color contrast"
    wcag_principles: ["Perceivable"]
  
  touch_targets:
    id: "touch_targets"
    name: "Touch Target Size"
    description: "Interactive elements must be large enough to tap accurately"
    wcag_principles: ["Operable"]
  
  keyboard_navigation:
    id: "keyboard_navigation"
    name: "Keyboard Navigation"
    description: "All functionality must be operable via keyboard"
    wcag_principles: ["Operable"]
  
  focus_management:
    id: "focus_management"
    name: "Focus Management"
    description: "Focus must be visible and managed logically"
    wcag_principles: ["Operable"]

# Rules (Coverage Metrics)
rules:
  # RULE 1: Semantic Labels
  - rule_id: "wcag_1_3_1_semantics_label"
    category: "semantics"
    severity: "critical"
    wcag_criterion: "1.3.1"
    wcag_level: "A"
    title: "Semantic Labels on Interactive Widgets"
    description: |
      All interactive widgets (GestureDetector, InkWell, custom buttons) 
      must be wrapped in Semantics widget with a label attribute.
    
    applies_to:
      - "GestureDetector"
      - "InkWell"
      - "InkResponse"
      - "Custom interactive widgets"
    
    excludes:
      - "ElevatedButton"
      - "TextButton"
      - "IconButton"
      - "FloatingActionButton"
    
    coverage_metric:
      id: "semantic_label_coverage"
      formula: "(widgets_with_semantics_label / total_custom_interactive_widgets) * 100"
      unit: "percentage"
      target: 100
      critical_threshold: 80
    
    test_cases:
      - name: "GestureDetector with Semantics label"
        code: |
          Semantics(
            label: 'Submit button',
            child: GestureDetector(
              onTap: () {},
              child: Text('Submit')
            )
          )
        expected_result: "PASS"
      
      - name: "GestureDetector WITHOUT Semantics label"
        code: |
          GestureDetector(
            onTap: () {},
            child: Text('Submit')
          )
        expected_result: "FAIL"
        issue: "GestureDetector lacks Semantics wrapper"
      
      - name: "ElevatedButton (built-in semantic)"
        code: |
          ElevatedButton(
            onPressed: () {},
            child: Text('Submit')
          )
        expected_result: "PASS"
        reason: "Built-in Flutter buttons have automatic semantics"
    
    how_to_fix: |
      Wrap custom interactive widgets in Semantics:
      
      ```dart
      Semantics(
        label: 'Clear description of what happens when tapped',
        onTap: () {},
        enabled: true,
        child: GestureDetector(
          onTap: () {},
          child: YourWidget()
        )
      )
      ```
    
    references:
      wcag: "https://www.w3.org/WAI/WCAG21/Understanding/info-and-relationships"
      flutter: "https://docs.flutter.dev/ui/accessibility"
      mdn: "https://developer.mozilla.org/en-US/docs/Web/Accessibility/Understanding_WCAG/Perceivable/Info_and_Relationships"

  # RULE 2: Color Contrast
  - rule_id: "wcag_1_4_3_contrast_minimum"
    category: "contrast"
    severity: "high"
    wcag_criterion: "1.4.3"
    wcag_level: "AA"
    title: "Minimum Color Contrast"
    description: |
      Text and interactive elements must have a minimum contrast ratio 
      of 4.5:1 for normal text and 3:1 for large text.
    
    requirements:
      - text_normal: "4.5:1"
      - text_large: "3:1"
      - graphics: "3:1"
    
    coverage_metric:
      id: "contrast_coverage"
      formula: "(elements_meeting_4_5_1 / total_text_elements) * 100"
      unit: "percentage"
      target: 100
      critical_threshold: 90
    
    test_cases:
      - name: "Black text on white background"
        text_color: "#000000"
        bg_color: "#FFFFFF"
        expected_ratio: 21.0
        expected_result: "PASS"
      
      - name: "Dark gray on light gray (insufficient)"
        text_color: "#666666"
        bg_color: "#CCCCCC"
        expected_ratio: 1.4
        expected_result: "FAIL"
        issue: "Contrast ratio 1.4:1 below 4.5:1 minimum"
    
    how_to_fix: |
      Use a contrast checker and adjust colors:
      - https://webaim.org/resources/contrastchecker/
      - https://color.adobe.com/create/color-contrast-analyzer
      
      Example in Flutter:
      ```dart
      Text(
        'Hello',
        style: TextStyle(
          color: Colors.black87,
          backgroundColor: Colors.white,
        ),
      )
      ```
    
    references:
      wcag: "https://www.w3.org/WAI/WCAG21/Understanding/contrast-minimum"

  # RULE 3: Touch Target Size
  - rule_id: "wcag_2_5_5_target_size_enhanced"
    category: "touch_targets"
    severity: "high"
    wcag_criterion: "2.5.5"
    wcag_level: "AAA"
    title: "Touch Target Size (Enhanced)"
    description: |
      Interactive elements must be at least 48x48 logical pixels (dp).
      This follows Material Design 3 guidelines.
    
    requirements:
      - minimum_size: "48x48 dp"
      - exceptions: "Inline elements (links in text), essential elements"
    
    coverage_metric:
      id: "touch_target_coverage"
      formula: "(elements_48x48_or_larger / total_interactive_elements) * 100"
      unit: "percentage"
      target: 100
      critical_threshold: 90
    
    test_cases:
      - name: "Button 48x48 dp"
        size: "48x48"
        expected_result: "PASS"
      
      - name: "Button 32x32 dp (too small)"
        size: "32x32"
        expected_result: "FAIL"
        issue: "Touch target 32x32 below minimum 48x48"
      
      - name: "IconButton default (auto 48x48)"
        code: "IconButton(icon: Icon(Icons.add), onPressed: () {})"
        expected_result: "PASS"
        reason: "Material IconButton defaults to 48x48"
    
    how_to_fix: |
      Ensure interactive elements are at least 48x48 dp:
      
      ```dart
      SizedBox(
        width: 48,
        height: 48,
        child: IconButton(
          icon: Icon(Icons.add),
          onPressed: () {}
        )
      )
      
      // Or use GestureDetector with padding
      GestureDetector(
        onTap: () {},
        child: Padding(
          padding: EdgeInsets.all(24),
          child: Icon(Icons.add)
        )
      )
      ```
    
    references:
      wcag: "https://www.w3.org/WAI/WCAG21/Understanding/target-size-enhanced"
      material: "https://m3.material.io/foundations/interaction-states"

  # RULE 4: Keyboard Navigation
  - rule_id: "wcag_2_1_1_keyboard"
    category: "keyboard_navigation"
    severity: "critical"
    wcag_criterion: "2.1.1"
    wcag_level: "A"
    title: "Keyboard Accessibility"
    description: |
      All functionality must be operable via keyboard navigation.
      Users should not require a mouse or specific timings.
    
    coverage_metric:
      id: "keyboard_navigation_coverage"
      formula: "(features_keyboard_accessible / total_interactive_features) * 100"
      unit: "percentage"
      target: 100
      critical_threshold: 95
    
    test_cases:
      - name: "Button accessible via keyboard (Tab + Enter)"
        code: |
          ElevatedButton(
            onPressed: () {},
            child: Text('Submit')
          )
        expected_result: "PASS"
        reason: "Built-in buttons support Tab and Enter"
      
      - name: "Custom gesture detector (no keyboard support)"
        code: |
          GestureDetector(
            onTap: () {},
            child: Container(color: Colors.blue)
          )
        expected_result: "FAIL"
        issue: "Custom gesture detector not keyboard accessible"
    
    references:
      wcag: "https://www.w3.org/WAI/WCAG21/Understanding/keyboard"

  # RULE 5: Focus Management
  - rule_id: "wcag_2_4_3_focus_order"
    category: "focus_management"
    severity: "high"
    wcag_criterion: "2.4.3"
    wcag_level: "A"
    title: "Focus Order"
    description: |
      Focus order must be logical and meaningful.
      Focus must be visible at all times.
    
    coverage_metric:
      id: "focus_management_coverage"
      formula: "(screens_with_proper_focus / total_screens) * 100"
      unit: "percentage"
      target: 95
      critical_threshold: 80
    
    test_cases:
      - name: "Form with logical focus order"
        code: |
          Form(
            child: Column(
              children: [
                TextField(autofocus: true),
                TextField(),
                ElevatedButton(onPressed: () {}, child: Text('Submit'))
              ]
            )
          )
        expected_result: "PASS"
        reason: "Focus flows naturally top to bottom"
      
      - name: "Scattered focus order"
        code: |
          Column(
            children: [
              FocusScope(focusNode: node2, child: TextField()),
              FocusScope(focusNode: node1, child: TextField()),
              FocusScope(focusNode: node3, child: ElevatedButton(...))
            ]
          )
        expected_result: "FAIL"
        issue: "Focus order is illogical"
    
    references:
      wcag: "https://www.w3.org/WAI/WCAG21/Understanding/focus-order"

# Compliance Levels
compliance:
  level_a:
    name: "Level A"
    description: "Basic accessibility"
    required_rules:
      - "wcag_1_3_1_semantics_label"
      - "wcag_2_1_1_keyboard"
      - "wcag_2_4_3_focus_order"
  
  level_aa:
    name: "Level AA"
    description: "Strong accessibility (most organizations target this)"
    required_rules:
      - "wcag_1_3_1_semantics_label"
      - "wcag_1_4_3_contrast_minimum"
      - "wcag_2_1_1_keyboard"
      - "wcag_2_4_3_focus_order"
  
  level_aaa:
    name: "Level AAA"
    description: "Enhanced accessibility"
    required_rules:
      - "wcag_1_3_1_semantics_label"
      - "wcag_1_4_3_contrast_minimum"
      - "wcag_2_1_1_keyboard"
      - "wcag_2_4_3_focus_order"
      - "wcag_2_5_5_target_size_enhanced"

# Meta
meta:
  authors:
    - name: "gearscrafter"
      role: "Creator"
  maintenance_status: "Actively maintained"
  next_version: "0.1.0"
  planned_additions:
    - "Text scaling coverage"
    - "Screen reader announcement coverage"
    - "Custom gesture alternatives coverage"